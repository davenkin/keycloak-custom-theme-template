services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    ports:
      - "8765:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - keycloak-custom-theme-template-volume:/opt/keycloak/data
      - ./themes/custom-terms:/opt/keycloak/themes/custom-terms:ro
    command: start-dev --spi-theme-static-max-age=-1 --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    networks:
      - keycloak-custom-theme-template-network
    restart: always

networks:
  keycloak-custom-theme-template-network:
    driver: bridge
volumes:
  keycloak-custom-theme-template-volume:
    driver: local
